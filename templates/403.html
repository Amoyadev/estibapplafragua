<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso no autorizado — Estibapp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background:#0d1b2a; min-height:100vh; display:flex; align-items:center; }
        .err-card { max-width:460px; margin:auto; }
        .err-code { font-size:3rem; font-weight:700; color:#adb5bd; letter-spacing:.1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="err-card w-100">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 text-center">
                <div class="err-code mb-1">403</div>
                <h5 class="mb-2">No tienes acceso a esta sección</h5>
                <p class="text-muted small mb-4">
                    Tu perfil no cuenta con permisos para esta operación. Si
                    crees que es un error, contacta al administrador.
                </p>
                <a href="{% url 'login' %}" class="btn btn-dark w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Ir al ingreso
                </a>
            </div>
        </div>
        <p class="text-center text-secondary small mt-3">Estibapp · Acceso restringido</p>
    </div>
</div>
</body>
</html>
