<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar — Estibapp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0d1b2a; min-height:100vh; display:flex; align-items:center; }
        .login-card { max-width:380px; margin:auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card w-100">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-1">🛳️ Estibapp</h3>
                <p class="text-center text-muted small mb-4">Gestión de depósito portuario</p>
                {% if form.errors %}
                    <div class="alert alert-danger py-2">Usuario o contraseña incorrectos.</div>
                {% endif %}
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-dark w-100">Ingresar</button>
                </form>
            </div>
        </div>
        <p class="text-center text-secondary small mt-3">Acceso restringido · MVP 1</p>
    </div>
</div>
</body>
</html>
