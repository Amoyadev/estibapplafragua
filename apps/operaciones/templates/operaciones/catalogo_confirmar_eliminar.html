{% extends "base.html" %}
{% block title %}Eliminar — Estibapp{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h4 class="mb-3">¿Eliminar este registro?</h4>
        <p class="text-muted">Vas a eliminar: <strong>{{ object }}</strong>. Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
