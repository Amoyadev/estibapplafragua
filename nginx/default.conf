# ===== Estiba — Nginx reverse proxy =====
upstream estiba_web {
    server web:8000;
}

# HTTP → redirige todo a HTTPS
server {
    listen 80;
    server_name estibapplafragua.cl www.estibapplafragua.cl;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name estibapplafragua.cl www.estibapplafragua.cl;

    ssl_certificate     /etc/letsencrypt/live/estibapplafragua.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/estibapplafragua.cl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://estiba_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
