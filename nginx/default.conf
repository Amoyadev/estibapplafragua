# ===== Estiba — Nginx reverse proxy =====
upstream estiba_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Tamaño máximo de subida (ajustar según necesidad)
    client_max_body_size 20M;

    # Archivos estáticos servidos por Nginx
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # Archivos de media (subidas)
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # Proxy al backend Django/Gunicorn
    location / {
        proxy_pass http://estiba_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
